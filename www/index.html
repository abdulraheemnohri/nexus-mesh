<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS MESH | Cyber-Workspace</title>
    <link rel="stylesheet" href="css/design-system.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>
    <div id="setup-screen" class="setup-container">
        <div class="card" style="max-width: 460px; text-align: center; padding: 3rem;">
            <h1 class="gradient-text" style="font-size: 3rem; font-weight: 800; margin-bottom: 0.5rem;">NEXUS</h1>
            <p style="color: var(--text-muted); margin-bottom: 2rem; letter-spacing: 0.2em;">DECENTRALIZED NODE</p>

            <div id="vault-entry" class="hide" style="margin-bottom: 2rem;">
                <input type="password" id="mesh-pass" placeholder="VAULT PASSPHRASE" style="background: rgba(255,0,85,0.05); border-color: var(--accent); color: var(--accent);">
            </div>

            <button id="create-room" class="btn-primary" style="width: 100%; padding: 1.5rem; font-size: 1.1rem; margin-bottom: 2rem;">
                INITIATE MESH ⚡
            </button>

            <div style="display: flex; gap: 0.8rem;">
                <input type="text" id="join-id" placeholder="NODE ID" style="background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; flex: 1; text-align: center; font-family: 'JetBrains Mono';">
                <button id="join-room" class="btn-ghost">JOIN</button>
            </div>
        </div>
    </div>

    <div id="app-screen" class="app-layout hide">
        <aside class="sidebar">
            <div class="logo-icon gradient-text" style="font-weight: 800; font-size: 1.5rem;">NX</div>
            <nav style="display: flex; flex-direction: column; gap: 1rem; width: 100%; align-items: center;">
                <button class="nav-item mobile-tab active" data-target="media-workspace">📺</button>
                <button class="nav-item mobile-tab" data-target="sketch-workspace">🎨</button>
                <button class="nav-item mobile-tab" data-target="file-workspace">📂</button>
                <button class="nav-item mobile-tab" data-target="chat-workspace">💬</button>
                <div style="flex: 1;"></div>
                <button id="settings-toggle" class="nav-item">⚙️</button>
            </nav>
        </aside>

        <main class="workspace">
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <div id="conn-status" class="connection-dot offline"></div>
                    <span id="display-room-id" style="font-family: 'JetBrains Mono'; font-weight: bold; font-size: 1.2rem;">------</span>
                </div>
                <div id="evolution-hud" style="font-size: 0.7rem; padding: 0.5rem 1rem; background: rgba(0,242,255,0.05); border-radius: 20px; border: 1px solid rgba(0,242,255,0.1);">
                    NEURAL STATE: OBSERVING
                </div>
                <div style="display: flex; gap: 1rem; align-items: center;">
                    <button id="copy-link" class="btn-ghost" style="padding: 0.5rem;">Invite 🔗</button>
                    <img id="room-qr" style="width: 32px; height: 32px; border-radius: 8px; cursor: pointer;">
                </div>
            </header>

            <div id="media-workspace" class="app-section mesh-grid">
                <div class="card" style="grid-column: 1 / -1; padding: 0; overflow: hidden;">
                    <div id="youtube-player-container"><div id="youtube-player"></div></div>
                </div>
                <div class="card">
                    <h3 style="margin-bottom: 1.5rem; font-size: 0.8rem; color: var(--text-muted);">SYNC QUEUE</h3>
                    <div id="queue-list" class="queue-list"></div>
                    <div style="display: flex; gap: 0.5rem; margin-top: 1.5rem;">
                        <input type="text" id="video-url" placeholder="Media URL..." style="padding: 0.5rem; flex: 1;">
                        <button id="add-to-queue" class="btn-primary" style="padding: 0.5rem 1rem;">+</button>
                    </div>
                </div>
                <div class="card">
                    <h3 style="margin-bottom: 1.5rem; font-size: 0.8rem; color: var(--text-muted);">CONSENSUS</h3>
                    <div id="polls-list"></div>
                    <button id="create-poll-btn" class="btn-ghost" style="width: 100%; margin-top: 1rem;">+ NEW PROPOSAL</button>
                </div>
            </div>

            <div id="sketch-workspace" class="app-section mobile-hide animate-slide">
                <div class="card" style="height: 600px; display: flex; flex-direction: column;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
                        <h3>SKETCH MESH</h3>
                        <div style="display: flex; gap: 0.5rem;">
                            <input type="color" id="sketch-color" value="#00f2ff" style="width: 40px; padding: 0; border: none;">
                            <button id="sketch-clear" class="btn-ghost" style="padding: 0.2rem 0.6rem; font-size: 0.7rem;">CLEAR</button>
                        </div>
                    </div>
                    <canvas id="sketch-canvas" class="sketch-canvas"></canvas>
                </div>
            </div>

            <div id="file-workspace" class="app-section mobile-hide animate-slide">
                <div class="card">
                    <h3>DATA EXCHANGE</h3>
                    <div style="padding: 2rem; border: 2px dashed var(--border); border-radius: 12px; text-align: center; margin: 1.5rem 0; cursor: pointer;" id="drop-zone">
                        <p style="color: var(--text-muted);">Drop files to broadcast to mesh</p>
                        <input type="file" id="file-input" style="display: none;">
                    </div>
                    <div id="file-list"></div>
                </div>
            </div>

            <div id="chat-workspace" class="app-section mobile-hide animate-slide">
                <div class="card wall-card" style="height: 600px;">
                    <div id="wall-messages" class="wall-messages"></div>
                    <div style="padding: 1rem; border-top: 1px solid var(--border); display: flex; gap: 0.8rem;">
                        <input type="text" id="wall-input" placeholder="Signal node..." style="flex: 1; background: transparent; border: none;">
                        <button id="send-message" class="btn-primary" style="padding: 0.6rem 1.2rem;">➜</button>
                    </div>
                </div>
            </div>

            <footer style="margin-top: 3rem; display: grid; grid-template-columns: 1fr 340px; gap: 2rem;">
                <div class="card" style="padding: 1rem;"><div id="system-log" style="height: 120px; overflow-y: auto; font-family: monospace; font-size: 0.65rem;"></div></div>
                <div class="card" style="padding: 1rem;">
                    <div id="topology-viz" class="node-hub"></div>
                    <div id="mesh-diagnostics" style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-top: 0.8rem; font-size: 0.6rem; opacity: 0.7;">
                        <span>UPTIME: <b id="diag-uptime">0s</b></span>
                        <span>TRAFFIC: <b id="diag-traffic">0kb</b></span>
                        <span>STABILITY: <b id="diag-stability">100%</b></span>
                        <span>PROTO: <b style="color:var(--primary);">NXM-V5.1</b></span>
                    </div>
                    <div id="peer-list" style="margin-top: 1rem; border-top: 1px solid var(--border); padding-top: 1rem;"></div>
                </div>
            </footer>
        </main>
    </div>

    <div id="overlay" class="overlay"></div>
    <div id="settings-panel" class="side-panel">
        <h2>NODE CONFIG</h2>
        <div style="margin-top: 2rem; display: flex; flex-direction: column; gap: 1.5rem;">
            <div>
                <label style="font-size: 0.7rem; opacity: 0.5;">ENVIRONMENT</label>
                <select id="setting-theme" onchange="window.Settings.update('theme', this.value)">
                    <option value="dark">CYBERPUNK</option>
                    <option value="light">MINIMALIST</option>
                    <option value="amoled">DEEP SPACE</option>
                </select>
            </div>
            <div style="display: flex; align-items: center; justify-content: space-between;">
                <label style="font-size: 0.7rem; opacity: 0.5;">STEALTH MODE</label>
                <input type="checkbox" id="setting-stealth" onchange="window.Settings.update('stealth', this.checked)" style="width: auto;">
            </div>
            <div style="display: flex; align-items: center; justify-content: space-between;">
                <label style="font-size: 0.7rem; opacity: 0.5;">CAMOUFLAGE</label>
                <input type="checkbox" id="setting-camouflage" onchange="window.Settings.update('camouflage', this.checked)" style="width: auto;">
            </div>
            <button id="export-data" class="btn-ghost" style="width: 100%;">💾 DUMP STATE</button>
            <button id="clear-local" class="btn-ghost" style="width: 100%; color: var(--accent);">🗑️ WIPE CACHE</button>
        </div>
    </div>

    <div id="poll-modal" class="modal">
        <div class="card modal-card">
            <h3>PROPOSAL</h3>
            <div class="modal-body">
                <input type="text" id="poll-q" placeholder="Enter question...">
                <div id="poll-options-inputs" class="opt-list"><input type="text" class="poll-opt-in" placeholder="Option 1"><input type="text" class="poll-opt-in" placeholder="Option 2"></div>
                <div class="modal-footer">
                    <button id="submit-poll" class="btn-primary" style="flex: 1;">PROPOSE</button>
                    <button onclick="document.getElementById('poll-modal').style.display='none'" class="btn-ghost" style="flex: 1;">CANCEL</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script type="module">
        import UI from './js/ui.js';
        import Settings from './js/settings.js';
        import State from './js/state.js';
        Settings.init(); UI.init(); window.Settings = Settings; window.State = State;
        window.toggleSettings = () => { document.getElementById('settings-panel').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); };
        document.getElementById('overlay').onclick = window.toggleSettings;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS MESH | P2P Collaboration Hub</title>
    <link rel="stylesheet" href="css/design-system.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- CDNs -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>
    <!-- Setup Screen -->
    <div id="setup-screen" class="container" style="height: 100vh; align-items: center; justify-content: center; display: flex; flex-direction: column;">
        <div class="card" style="text-align: center; max-width: 400px; width: 100%;">
            <h1 style="margin-bottom: 1rem; color: var(--primary);">NEXUS MESH</h1>
            <p style="margin-bottom: 2rem; color: var(--text-muted);">Zero-backend P2P Real-Time Hub</p>

            <button id="create-room" style="width: 100%; margin-bottom: 1rem;">Create New Room</button>

            <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
                <input type="text" id="join-id" placeholder="Enter Room ID" style="text-transform: uppercase;">
                <button id="join-room">Join</button>
            </div>
        </div>
    </div>

    <!-- App Screen -->
    <div id="app-screen" class="hide">
        <div class="status-hud">
            <span id="display-room-id" style="font-weight: bold; color: var(--primary); font-family: monospace;">------</span>
            <div id="conn-status" class="offline"></div><img id="room-qr" style="width: 32px; height: 32px; cursor: pointer;" onclick="window.open(this.src)">
            <button id="settings-toggle" style="padding: 0.5rem; background: none; color: var(--text);">⚙️</button>
        </div>

        <div class="container">
            <!-- Left Column: Player & Queue -->
            <div class="player-section">
                <div id="youtube-player-container" class="card">
                    <div id="youtube-player"></div>
                </div>

                <div class="card" style="margin-top: 1.5rem;">
                    <div style="display: flex; gap: 0.5rem; margin-bottom: 1rem;">
                        <input type="text" id="video-url" placeholder="Paste YouTube URL here...">
                        <button id="add-to-queue">Add</button>
                    </div>
                    <div id="queue-list" style="display: flex; flex-direction: column; gap: 0.5rem;">
                        <!-- Queue items rendered here -->
                    </div>
                </div>
            </div>

            <!-- Right Column: Wall & Polls -->
            <div class="wall-section card">
                <h3 style="margin-bottom: 1rem;">Message Wall</h3>
                <div id="wall-messages">
                    <!-- Messages rendered here -->
                </div>
                <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
                    <input type="text" id="wall-input" placeholder="Type a message...">
                    <button id="send-message">Send</button>
                </div>
            </div>

            <div class="polls-section">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                    <h3>Live Polls</h3>
                    <button id="create-poll-btn" style="padding: 0.3rem 0.8rem; font-size: 0.8rem;">+ New Poll</button>
                </div>
                <div id="polls-list" style="display: flex; flex-direction: column; gap: 1rem;">
                    <!-- Polls rendered here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Settings Panel -->
    <div id="settings-panel">
        <h2 style="margin-bottom: 1.5rem;">Settings</h2>

        <div style="margin-bottom: 1.5rem;">
            <label>Theme</label>
            <select id="setting-theme" onchange="window.Settings.update('theme', this.value)" style="width: 100%; padding: 0.5rem; margin-top: 0.5rem;">
                <option value="dark">Dark</option>
                <option value="light">Light</option>
            </select>
        </div>

        <div style="margin-bottom: 1.5rem;">
            <label>Message Lifetime (seconds)</label>
            <input type="number" id="setting-msg-life" value="60" onchange="window.Settings.update('msgLifetime', parseInt(this.value))">
        </div>

        <div style="display: flex; flex-direction: column; gap: 1rem; margin-bottom: 2rem;">
            <button id="export-data">Export State (JSON)</button>
            <div style="position: relative;">
                <button style="width: 100%;">Import State</button>
                <input type="file" id="import-data" style="position: absolute; top: 0; left: 0; opacity: 0; cursor: pointer;">
            </div>
        </div>

        <button onclick="document.getElementById('settings-panel').classList.remove('show')" style="width: 100%; background: var(--text-muted);">Close</button>
    </div>

    <!-- Poll Modal -->
    <div id="poll-modal" class="hide" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; display: flex; align-items: center; justify-content: center;">
        <div class="card" style="max-width: 400px; width: 90%;">
            <h3>Create Poll</h3>
            <input type="text" id="poll-q" placeholder="Question" style="margin: 1rem 0;">
            <input type="text" id="poll-o1" placeholder="Option 1" style="margin-bottom: 0.5rem;">
            <input type="text" id="poll-o2" placeholder="Option 2" style="margin-bottom: 0.5rem;">
            <input type="text" id="poll-o3" placeholder="Option 3 (optional)" style="margin-bottom: 0.5rem;">
            <input type="text" id="poll-o4" placeholder="Option 4 (optional)" style="margin-bottom: 1rem;">
            <div style="display: flex; gap: 0.5rem;">
                <button id="submit-poll" style="flex: 1;">Create</button>
                <button onclick="document.getElementById('poll-modal').classList.add('hide')" style="flex: 1; background: var(--text-muted);">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <!-- App Entry -->
    <script type="module">
        import UI from './js/ui.js';
        import Settings from './js/settings.js';

        // Initialize
        Settings.init();
        UI.init();

        // Expose to window for inline handlers
        window.Settings = Settings;
    </script>
</body>
</html>
